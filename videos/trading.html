<!DOCTYPE html>
<html>
<head>
  <title>RO'Lyfe Trading Terminal</title>
  <link rel="stylesheet" href="../../styles.css">
</head>

<body>

<h1>📊 Trading Terminal</h1>

<!-- TIME ENGINE -->
<div class="panel">
  <h2>⏱ Market Session</h2>
  <p id="session"></p>
</div>

<!-- VIDEO ENGINE -->
<div class="panel">
  <h2>🎥 Trade Video Feed</h2>

  <div id="videoContainer"></div>

  <p id="videoNotes"></p>
</div>

<!-- CHART ENGINE -->
<div class="panel">
  <h2>📈 Market Chart</h2>
  <canvas id="marketChart"></canvas>
</div>

<!-- OPTIONS LADDER -->
<div class="panel">
  <h2>⚙️ Options Practice Ladder</h2>

  <select id="strategy">
    <option>Call Ladder</option>
    <option>Put Ladder</option>
    <option>Iron Condor</option>
    <option>Straddle</option>
  </select>

  <select id="ticker">
    <option>SPY</option>
    <option>QQQ</option>
    <option>NVDA</option>
    <option>AAPL</option>
    <option>TSLA</option>
  </select>

  <button onclick="simulateTrade()">Run Simulation</button>

  <p id="result"></p>
</div>

<!-- NOTES -->
<div class="panel">
  <h2>🧠 Rules of Engagement</h2>
  <ul>
    <li>Trade only during high probability sessions</li>
    <li>Follow trend + volume confirmation</li>
    <li>Never overtrade opening volatility</li>
    <li>Respect stop-loss always</li>
  </ul>
</div>

<script src="trading-engine.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>
</html>
